<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, touch-action: none">
    <title>暗夜幸存者 · 极致优化版</title>
    <style>
        :root { --bg: #050510; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; touch-action: none; position: fixed; top: 0; left: 0; }
        #game-container { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 12vh; }
        #menu-buttons { display: flex; flex-direction: column; align-items: center; gap: 14px; pointer-events: auto; margin-top: 8vh; }
        .menu-btn { background: linear-gradient(135deg, #3a1e5c, #1e1e3a); border: 2px solid #b27aff; color: #f0e6ff; padding: 14px 40px; border-radius: 40px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 32px rgba(150,80,255,0.55); text-shadow: 0 0 12px #b27aff; letter-spacing: 2px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; pointer-events: auto; min-width: 200px; text-align: center; }
        .menu-btn:active { background: linear-gradient(135deg, #5a2e8a, #2e2e5a); box-shadow: 0 0 55px rgba(180,100,255,0.95); border-color: #d4aaff; transform: scale(0.95); }
        .menu-btn.special { background: linear-gradient(135deg, #4a2a1a, #2a1a2a); border-color: #ffaa60; box-shadow: 0 0 32px rgba(255,120,40,0.6); color: #ffe0cc; text-shadow: 0 0 12px #ff8844; }
        .menu-btn.hard { background: linear-gradient(135deg, #2a1010, #1a0505); border-color: #ff4444; box-shadow: 0 0 36px rgba(255,50,50,0.65); color: #ffcccc; text-shadow: 0 0 14px #ff3333; }
        #photo-assign-panel { display: none; flex-direction: column; align-items: center; gap: 12px; pointer-events: auto; background: rgba(10,5,20,0.93); border: 2px solid #b27aff; border-radius: 22px; padding: 22px; max-width: 92vw; box-shadow: 0 0 70px rgba(120,40,200,0.7); z-index: 20; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #photo-assign-panel h3 { color: #ffe8c0; font-size: 1.2rem; text-align: center; margin: 0; }
        .photo-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 45vh; overflow-y: auto; padding: 5px; }
        .photo-slot { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #555; cursor: pointer; transition: all 0.15s; object-fit: cover; -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex-shrink: 0; }
        .photo-slot.selected-player { border-color: #ffd700 !important; box-shadow: 0 0 28px rgba(255,215,0,0.85) !important; transform: scale(1.1); }
        .photo-slot.selected-enemy { border-color: #ff4444 !important; box-shadow: 0 0 18px rgba(255,60,60,0.55) !important; }
        #btn-confirm-assign, #btn-cancel-assign { background: linear-gradient(135deg, #5a3a1e, #3a1e1e); border: 2px solid #ffaa60; color: #ffe0cc; padding: 12px 32px; border-radius: 32px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 22px rgba(255,120,40,0.55); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        #btn-cancel-assign { background: transparent; border: 1px solid #888; color: #ccc; box-shadow: none; }
        .hidden-input { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="menu-buttons">
            <button class="menu-btn" id="btn-normal">🌙 经典模式</button>
            <button class="menu-btn special" id="btn-meme">📸 恶搞模式</button>
            <button class="menu-btn hard" id="btn-hard">💀 超难模式</button>
        </div>
        <div id="photo-assign-panel">
            <h3>📷 分配照片角色</h3>
            <p class="subtitle">点击一张设为<strong style="color:#ffd700;">玩家角色</strong>，其余自动成为敌人</p>
            <div class="photo-grid" id="photo-grid"></div>
            <p class="subtitle" id="assign-hint" style="color:#ffd700;">👆 请点击选择你的角色照片</p>
            <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
                <button id="btn-confirm-assign">✅ 确认开始</button>
                <button id="btn-cancel-assign">↩ 返回</button>
            </div>
        </div>
    </div>
    <input type="file" id="photoInput" class="hidden-input" accept="image/*" multiple>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuButtons = document.getElementById('menu-buttons');
    const btnNormal = document.getElementById('btn-normal');
    const btnMeme = document.getElementById('btn-meme');
    const btnHard = document.getElementById('btn-hard');
    const photoInput = document.getElementById('photoInput');
    const photoAssignPanel = document.getElementById('photo-assign-panel');
    const photoGrid = document.getElementById('photo-grid');
    const btnConfirmAssign = document.getElementById('btn-confirm-assign');
    const btnCancelAssign = document.getElementById('btn-cancel-assign');
    const assignHint = document.getElementById('assign-hint');

    const W = 480, H = 800;
    canvas.width = W;
    canvas.height = H;

    // ==================== 音频管理器 (带节流) ====================
    const audioManager = {
        bgmAudio: null,
        hasBGM: false,
        pickupAudio: null,
        hasPickup: false,
        hitAudios: {},
        hasHit: {},
        sfxVolume: 0.5,
        bgmVolume: 0.35,
        playHistory: {},  // 节流记录

        init() {
            this.bgmAudio = new Audio();
            this.bgmAudio.loop = true;
            this.bgmAudio.volume = this.bgmVolume;
            this.bgmAudio.preload = 'auto';
            this.bgmAudio.src = 'bgm.mp3';
            this.bgmAudio.addEventListener('canplaythrough', () => { this.hasBGM = true; }, { once: true });
            this.bgmAudio.load();

            this.pickupAudio = new Audio();
            this.pickupAudio.volume = this.sfxVolume;
            this.pickupAudio.preload = 'auto';
            this.pickupAudio.src = 'pickup.mp3';
            this.pickupAudio.addEventListener('canplaythrough', () => { this.hasPickup = true; }, { once: true });
            this.pickupAudio.load();

            const weaponHitMap = {
                'magicBolt': 'hit_normal.mp3',
                'spinningShield': 'hit_normal.mp3',
                'lightningChain': 'hit_lightning.mp3',
                'fireNova': 'hit_fire.mp3',
                'iceShard': 'hit_ice.mp3',
                'ricochetBolt': 'hit_normal.mp3',
                'scatterShot': 'hit_normal.mp3',
                'blackHole': 'hit_dark.mp3',
            };
            const defaultAudio = new Audio();
            defaultAudio.volume = this.sfxVolume;
            defaultAudio.preload = 'auto';
            defaultAudio.src = 'hit.mp3';
            defaultAudio.addEventListener('canplaythrough', () => { this.hitAudios['default'] = defaultAudio; this.hasHit['default'] = true; }, { once: true });
            defaultAudio.load();
            this.hitAudios['default'] = defaultAudio;

            Object.entries(weaponHitMap).forEach(([type, file]) => {
                const audio = new Audio();
                audio.volume = this.sfxVolume;
                audio.preload = 'auto';
                audio.src = file;
                audio.addEventListener('canplaythrough', () => { this.hitAudios[type] = audio; this.hasHit[type] = true; }, { once: true });
                audio.load();
                this.hitAudios[type] = audio;
            });
        },

        throttlePlay(audioKey) {
            const now = Date.now();
            if (!this.playHistory[audioKey]) this.playHistory[audioKey] = [];
            const history = this.playHistory[audioKey];
            // 清理超过1秒的记录
            while (history.length > 0 && now - history[0] > 1000) history.shift();
            if (history.length >= 5) return false;
            history.push(now);
            return true;
        },

        playBGM() { if (this.hasBGM && this.bgmAudio) { this.bgmAudio.currentTime = 0; this.bgmAudio.play().catch(() => {}); } },
        stopBGM() { if (this.bgmAudio) { this.bgmAudio.pause(); this.bgmAudio.currentTime = 0; } },
        pauseBGM() { if (this.bgmAudio && this.hasBGM) this.bgmAudio.pause(); },
        resumeBGM() { if (this.bgmAudio && this.hasBGM) this.bgmAudio.play().catch(() => {}); },

        playHit(weaponType) {
            const key = 'hit_' + weaponType;
            if (!this.throttlePlay(key)) return false;
            let audio = this.hitAudios[weaponType];
            if (audio && this.hasHit[weaponType]) {
                const clone = audio.cloneNode();
                clone.volume = this.sfxVolume;
                clone.play().catch(() => {});
                return true;
            }
            const defaultAudio = this.hitAudios['default'];
            if (defaultAudio && this.hasHit['default']) {
                const clone = defaultAudio.cloneNode();
                clone.volume = this.sfxVolume;
                clone.play().catch(() => {});
                return true;
            }
            return false;
        },

        playPickup() {
            const key = 'pickup';
            if (!this.throttlePlay(key)) return false;
            if (this.hasPickup && this.pickupAudio) {
                const clone = this.pickupAudio.cloneNode();
                clone.volume = this.sfxVolume;
                clone.play().catch(() => {});
                return true;
            }
            return false;
        }
    };
    audioManager.init();

    // ==================== Web Audio fallback ====================
    let audioCtx = null;
    function initAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } if (audioCtx?.state === 'suspended') audioCtx.resume(); }
    function playSynthSound(freq, type, dur, vol = 0.07) {
        if (!audioCtx) return;
        try {
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(vol, t);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + dur);
        } catch(e) {}
    }

    function sfxPickup() { if (!audioManager.playPickup()) playSynthSound(800, 'sine', 0.08, 0.04); }
    function sfxHit(weaponType) {
        if (!audioManager.playHit(weaponType)) {
            switch (weaponType) {
                case 'fireNova': playSynthSound(80, 'sawtooth', 0.12, 0.05); break;
                case 'iceShard': playSynthSound(200, 'triangle', 0.08, 0.04); break;
                case 'lightningChain': playSynthSound(40, 'square', 0.1, 0.03); break;
                case 'blackHole': playSynthSound(30, 'sawtooth', 0.15, 0.06); break;
                default: playSynthSound(60, 'triangle', 0.1, 0.03);
            }
        }
    }
    function sfxExplosion() { playSynthSound(25, 'sawtooth', 0.3, 0.06); }
    function sfxLevelUp() { playSynthSound(500, 'sine', 0.12, 0.03); setTimeout(() => playSynthSound(700, 'sine', 0.12, 0.03), 70); }
    function sfxBossAppear() { playSynthSound(22, 'sawtooth', 0.55, 0.1); }
    function sfxWaveClear() { playSynthSound(450, 'sine', 0.14, 0.04); }

    // ==================== 游戏状态 ====================
    const STATE = { MENU:'menu', PLAYING:'playing', LEVELUP:'levelUp', WAVE_TRANS:'waveTrans', GAMEOVER:'gameOver', VICTORY:'victory', PAUSED:'paused' };
    let gameState = STATE.MENU;
    let gameTime = 0, deltaTime = 0, lastTime = 0;
    let waveNumber = 0, waveTimer = 0, waveDuration = 28;
    let totalKills = 0, shakeAmount = 0;
    let stageIndex = 0, stageTransitionTimer = 0;
    const TOTAL_STAGES = 5;
    const STAGES = [
        { name:'暗影墓地', bg1:'#0d0d1a', bg2:'#1a0d2e', weights:{skeleton:1,bat:0.2,zombie:0}, boss:'necromancer' },
        { name:'诅咒森林', bg1:'#0a1a0d', bg2:'#0d2e1a', weights:{skeleton:0.6,bat:1,zombie:0.4}, boss:'treant' },
        { name:'烈焰地牢', bg1:'#1a0d0a', bg2:'#2e1a0d', weights:{skeleton:0.4,bat:0.6,zombie:1}, boss:'fireGolem' },
        { name:'冰封深渊', bg1:'#0a0d1a', bg2:'#0d1a2e', weights:{skeleton:0.8,bat:0.8,zombie:0.8}, boss:'iceDragon' },
        { name:'混沌王座', bg1:'#120a18', bg2:'#1a0a1a', weights:{skeleton:1.2,bat:1,zombie:1.2}, boss:'chaosLord' },
    ];

    let gameMode = 'normal';
    let memePlayerImg = null;
    let memeEnemyImgs = [];
    let pendingMemeImages = [];
    let selectedPlayerPhotoIndex = -1;

    // ==================== 浮动摇杆状态 ====================
    let joystickActive = false;
    let joystickTouchId = null;
    let joystickBaseX = 0, joystickBaseY = 0;   // 摇杆基准点（手指落点）
    let joystickThumbX = 0, joystickThumbY = 0; // 拇指当前位置
    let joystickDX = 0, joystickDY = 0;         // 归一化方向
    const joystickMaxRadius = 55;                // 摇杆最大半径

    let totalDamageDealt = 0;
    let totalDamageReceived = 0;
    let gameStartTime = 0;
    let gameEndTime = 0;

    const player = {
        x: W/2, y: H*0.55, radius: 24,
        hp:130, maxHp:130, speed:230, armor:0, regen:0, regenTimer:0,
        expPickupRange:100, expMultiplier:1.0, invincibleTimer:0,
        weapons:[], level:1, exp:0, expToNext:40,
        color:'#e8d5ff', glowColor:'#c09fff',
        critChance:0, critMult:1.5, lifeSteal:0, explodeKill:false,
    };

    function resetPlayer() {
        player.x=W/2; player.y=H*0.55; player.hp=player.maxHp;
        player.level=1; player.exp=0; player.expToNext=40; player.speed=230;
        player.armor=0; player.regen=0; player.regenTimer=0; player.expPickupRange=100;
        player.expMultiplier=1.0; player.invincibleTimer=0;
        player.weapons=[]; player.critChance=0; player.lifeSteal=0; player.explodeKill=false;
        player.weapons.push(createWeapon('magicBolt'));
    }

    function createWeapon(type) {
        const base = {
            magicBolt:{ name:'魔法飞弹', type:'magicBolt', damage:15, cooldown:0.6, timer:0, speed:440, count:1, pierce:0, range:340, color:'#7eb8ff', glow:'#4d94ff', size:4.5, level:1 },
            spinningShield:{ name:'旋转护盾', type:'spinningShield', damage:22, cooldown:0.04, timer:0, count:2, orbitRadius:52, orbitSpeed:3.6, orbitAngle:0, color:'#ffd700', glow:'#ffaa00', size:7.5, level:1 },
            lightningChain:{ name:'闪电链', type:'lightningChain', damage:26, cooldown:1.15, timer:0, count:3, chainRange:130, color:'#d4a0ff', glow:'#b050ff', size:3.5, level:1 },
            fireNova:{ name:'烈焰新星', type:'fireNova', damage:34, cooldown:1.9, timer:1.0, novaRadius:145, color:'#ff6030', glow:'#ff3000', size:5.5, level:1 },
            iceShard:{ name:'冰晶碎片', type:'iceShard', damage:12, cooldown:0.38, timer:0, speed:330, count:3, spread:0.7, slowAmount:0.5, slowDuration:2.0, color:'#a0e8ff', glow:'#60d0ff', size:4, level:1 },
            ricochetBolt:{ name:'弹射飞弹', type:'ricochetBolt', damage:20, cooldown:0.8, timer:0, speed:380, count:1, pierce:0, ricochet:3, range:400, color:'#ffaa40', glow:'#ff8830', size:5, level:1 },
            scatterShot:{ name:'散射弹幕', type:'scatterShot', damage:11, cooldown:0.5, timer:0, speed:350, count:5, spread:1.2, color:'#ff80ff', glow:'#ff50d0', size:3.5, level:1 },
            blackHole:{ name:'黑洞', type:'blackHole', damage:30, cooldown:2.5, timer:0, pullRadius:160, damageRadius:120, duration:1.8, color:'#202020', glow:'#8040ff', size:8, level:1 },
        };
        const w = JSON.parse(JSON.stringify(base[type]));
        w.timer = w.cooldown*0.5;
        if(w.type==='spinningShield') w.orbitAngle = Math.random()*Math.PI*2;
        return w;
    }
    function upgradeWeapon(w) {
        w.level++; w.damage = Math.floor(w.damage*1.24); w.cooldown = Math.max(0.04, w.cooldown*0.88);
        if(w.type==='magicBolt' && w.level%3===0) w.count++;
        if(w.type==='spinningShield' && w.level%2===0) w.count++;
        if(w.type==='lightningChain' && w.level%2===0) w.count++;
        if(w.type==='fireNova') w.novaRadius += 20;
        if(w.type==='iceShard' && w.level%2===0) w.count++;
        if(w.type==='ricochetBolt') { w.ricochet = Math.min(6, w.ricochet+1); if(w.level%2===0) w.count++; }
        if(w.type==='scatterShot') { w.count = Math.min(12, w.count+2); w.spread = Math.min(2.0, w.spread*1.05); }
        if(w.type==='blackHole') { w.pullRadius += 15; w.damageRadius += 15; w.damage = Math.floor(w.damage*1.25); }
    }

    let projectiles=[], particles=[], damageNumbers=[], lightningArcs=[];
    let enemies=[], expOrbs=[], blackHoles=[];
    function spawnProjectile(x,y,vx,vy,w,extra={}) { projectiles.push({x,y,vx,vy,damage:w.damage,weapon:w,life:2.8,maxLife:2.8,pierceRemaining:w.pierce||0,hitEnemies:new Set(),...extra}); }
    function spawnParticle(x,y,vx,vy,color,life,size=3){ particles.push({x,y,vx,vy,color,life,maxLife:life,size}); }
    function spawnDamageNumber(x,y,value,color='#fff'){ damageNumbers.push({x:x+(Math.random()-0.5)*24,y:y-14,value:Math.round(value),color,life:0.8,maxLife:0.8,vy:-65-Math.random()*35}); }
    function spawnLightningArc(x1,y1,x2,y2,color,life=0.25){ const arc={x1,y1,x2,y2,color,life,maxLife:life,segments:[]}; const dx=x2-x1,dy=y2-y1,dist=Math.sqrt(dx*dx+dy*dy),segs=Math.max(5,Math.floor(dist/20)); for(let i=0;i<=segs;i++){ const t=i/segs; arc.segments.push({x:x1+dx*t+(i>0&&i<segs?(Math.random()-0.5)*dist*0.3:0), y:y1+dy*t+(i>0&&i<segs?(Math.random()-0.5)*dist*0.3:0)}); } lightningArcs.push(arc); }

    function spawnEnemy(type,x,y,ohp=0,ospd=0,odmg=0){
        const base={ skeleton:{hp:38,speed:90,damage:11,exp:7,radius:15,color:'#c8c8c8',glow:'#999'}, bat:{hp:20,speed:185,damage:8,exp:5,radius:12,color:'#dda0a0',glow:'#c55'}, zombie:{hp:70,speed:58,damage:24,exp:12,radius:18,color:'#8a9a6a',glow:'#5a6a3a'} };
        const s=base[type]||base.skeleton;
        let waveScale, speedScale, damageScale;
        if (gameMode === 'hard') {
            waveScale = 1 + (waveNumber - 1) * 0.28;
            speedScale = 1 + (waveNumber - 1) * 0.06;
            damageScale = 1 + (waveNumber - 1) * 0.22;
        } else {
            waveScale = 1 + (waveNumber - 1) * 0.13;
            speedScale = 1 + (waveNumber - 1) * 0.035;
            damageScale = 1 + (waveNumber - 1) * 0.13;
        }
        const stageScale = 1 + stageIndex * 0.28;
        const e={ type,x,y, hp:ohp||Math.floor(s.hp*waveScale*stageScale), maxHp:ohp||Math.floor(s.hp*waveScale*stageScale), speed:ospd||(s.speed*speedScale), damage:odmg||Math.floor(s.damage*damageScale), exp:Math.floor(s.exp*(1+waveNumber*0.09)), radius:s.radius, color:s.color, glowColor:s.glow, slowTimer:0,slowAmount:0,hitFlashTimer:0,_shieldHitCd:0, assignedImg:null };
        if(gameMode==='meme' && memeEnemyImgs.length>0) e.assignedImg = memeEnemyImgs[Math.floor(Math.random()*memeEnemyImgs.length)];
        enemies.push(e); return e;
    }
    function spawnBoss(type){
        const defs={ necromancer:{hp:700,spd:54,dmg:38,exp:240,radius:34,color:'#2a2a3a',glow:'#7a3aff',name:'亡灵巫师'}, treant:{hp:850,spd:42,dmg:45,exp:300,radius:38,color:'#3a4a2a',glow:'#5a8a30',name:'腐化树精'}, fireGolem:{hp:1000,spd:48,dmg:54,exp:380,radius:36,color:'#4a2a1a',glow:'#ff5020',name:'烈焰魔像'}, iceDragon:{hp:1200,spd:60,dmg:50,exp:460,radius:40,color:'#2a3a4a',glow:'#60c0ff',name:'冰霜巨龙'}, chaosLord:{hp:1700,spd:52,dmg:66,exp:680,radius:44,color:'#3a1a3a',glow:'#ff30ff',name:'混沌之王'} };
        const d=defs[type]||defs.necromancer;
        const hardMult = gameMode === 'hard' ? 1.5 : 1.0;
        const b={ type:'boss',bossType:type,bossName:d.name, x:W/2+(Math.random()-0.5)*300, y:H/2+(Math.random()-0.5)*250, hp:Math.floor(d.hp*(1+stageIndex*0.35)*hardMult), maxHp:Math.floor(d.hp*(1+stageIndex*0.35)*hardMult), speed:d.spd*hardMult, damage:Math.floor(d.dmg*hardMult), exp:Math.floor(d.exp*(1+stageIndex*0.25)), radius:d.radius, color:d.color, glowColor:d.glow, slowTimer:0,slowAmount:0,hitFlashTimer:0, isBoss:true, phaseTimer:0,specialTimer:3.5, assignedImg:null };
        if(gameMode==='meme' && memeEnemyImgs.length>0) b.assignedImg = memeEnemyImgs[Math.floor(Math.random()*memeEnemyImgs.length)];
        enemies.push(b); sfxBossAppear(); return b;
    }
    function getEnemyType(){ const w=STAGES[Math.min(stageIndex,STAGES.length-1)].weights; const t=(w.skeleton||0)+(w.bat||0)+(w.zombie||0); let r=Math.random()*t; if(r<(w.skeleton||0))return'skeleton'; r-=(w.skeleton||0); if(r<(w.bat||0))return'bat'; return'zombie'; }
    function spawnEnemyAtEdge(){ const m=35; let x,y; const s=Math.floor(Math.random()*4); switch(s){case 0:x=-m;y=Math.random()*H;break; case 1:x=W+m;y=Math.random()*H;break; case 2:x=Math.random()*W;y=-m;break; case 3:x=Math.random()*W;y=H+m;break;} spawnEnemy(getEnemyType(),x,y); }

    function generateUpgradeOptions(){
        const pool=[];
        const add=(id,name,desc,icon,rarity,apply)=>pool.push({id,name,desc,icon,rarity,apply});
        add('dmgUp','伤害强化 +20%','所有武器伤害','⚔️','common',()=>player.weapons.forEach(w=>w.damage=Math.floor(w.damage*1.2)));

        add('cdReduce','冷却缩减 +12%','武器冷却','⏱️','common',()=>player.weapons.forEach(w=>w.cooldown=Math.max(0.03,w.cooldown*0.88)));
        add('critUp','暴击率 +10%','1.5倍暴击','💥','rare',()=>player.critChance=Math.min(0.8,player.critChance+0.1));
        add('lifeSteal','生命偷取 +8%','伤害回血','🩸','rare',()=>player.lifeSteal+=0.08);
        add('explodeKill','击杀爆炸','敌人死亡爆炸','💣','rare',()=>player.explodeKill=true);
        add('pierceAll','穿透 +1','投射物穿透','🔱','rare',()=>player.weapons.forEach(w=>{if(w.pierce!==undefined)w.pierce+=1;}));
        for(const w of player.weapons) pool.push({id:'up_'+w.type,name:`升级 ${w.name} Lv${w.level}→${w.level+1}`,desc:`伤害+24% 冷却-12%`,icon:'🔺',rarity:'weapon',apply:()=>upgradeWeapon(w)});
        const owned=player.weapons.map(w=>w.type);
        const allTypes=['magicBolt','spinningShield','lightningChain','fireNova','iceShard','ricochetBolt','scatterShot','blackHole'];
        const availNew=allTypes.filter(t=>!owned.includes(t));
        if(player.weapons.length<6 && availNew.length>0){
            const nt=availNew[Math.floor(Math.random()*availNew.length)];

        }
        return pool.sort(()=>Math.random()-0.5).slice(0,Math.min(4,pool.length));

    let currentUpgradeOptions=[], upgradeCardRects=[];
    function triggerLevelUp(){ gameState=STATE.LEVELUP; currentUpgradeOptions=generateUpgradeOptions(); upgradeCardRects=[]; sfxLevelUp(); }
    function applyUpgrade(idx){
        if(idx<0||idx>=currentUpgradeOptions.length)return;
        currentUpgradeOptions[idx].apply(); player.level++; player.exp-=player.expToNext;
        player.expToNext=Math.floor(player.expToNext*1.3)+10; player.exp=Math.max(0,player.exp);
        currentUpgradeOptions=[]; upgradeCardRects=[]; gameState=STATE.PLAYING; player.invincibleTimer=0.5;
        for(let i=0;i<50;i++){ const a=Math.random()*Math.PI*2; spawnParticle(player.x,player.y,Math.cos(a)*200,Math.sin(a)*200,'#ffe8a0',0.6,3.5); }
    }
    function handleLevelUpClick(cx,cy){ for(let i=0;i<upgradeCardRects.length;i++){ const r=upgradeCardRects[i]; if(cx>=r.x&&cx<=r.x+r.w&&cy>=r.y&&cy<=r.y+r.h){ applyUpgrade(i); return; } } }
    function handleLevelUpKey(key){ const n=parseInt(key); if(n>=1&&n<=currentUpgradeOptions.length) applyUpgrade(n-1); }

    let explodingNow = false;
    function dealDamage(enemy,dmg,weapon,isExplosion=false){
        let finalDmg=dmg;
        if(player.critChance>0 && Math.random()<player.critChance) finalDmg=Math.floor(dmg*player.critMult);
        enemy.hp-=finalDmg; enemy.hitFlashTimer=0.14;
        totalDamageDealt += finalDmg;
        spawnDamageNumber(enemy.x,enemy.y,finalDmg, finalDmg>dmg?'#ffaa00':'#ffdd88');
        if(weapon&&weapon.type==='iceShard'){ enemy.slowTimer=weapon.slowDuration; enemy.slowAmount=weapon.slowAmount; }
        if(player.lifeSteal>0) player.hp=Math.min(player.maxHp, player.hp+Math.floor(finalDmg*player.lifeSteal));
        if(weapon) sfxHit(weapon.type);
        if(enemy.hp<=0) killEnemy(enemy,isExplosion);
    }
    function killEnemy(enemy,isExplosion=false){
        const idx=enemies.indexOf(enemy);
        if(idx===-1) return;
        const cnt=enemy.isBoss?100:22;
        for(let i=0;i<cnt;i++){ const a=Math.random()*Math.PI*2; const sp=40+Math.random()*(enemy.isBoss?260:160); spawnParticle(enemy.x,enemy.y,Math.cos(a)*sp,Math.sin(a)*sp, enemy.glowColor,0.4+Math.random()*0.7,2.5+Math.random()*4); }
        if(player.explodeKill && !enemy.isBoss && !isExplosion && !explodingNow){
            explodingNow=true;
            const targets=enemies.filter(e=>e!==enemy && Math.hypot(e.x-enemy.x,e.y-enemy.y)<90);
            for(const e of targets) dealDamage(e,Math.floor(enemy.maxHp*0.25),null,true);
            spawnParticle(enemy.x,enemy.y,0,0,'#ff8844',0.5,25);
            explodingNow=false;
        }
        const expVal=enemy.exp*player.expMultiplier;
        const orbCnt=enemy.isBoss?14:Math.max(1,Math.floor(expVal/4.5));
        for(let i=0;i<orbCnt;i++) expOrbs.push({x:enemy.x+(Math.random()-0.5)*45,y:enemy.y+(Math.random()-0.5)*45,value:expVal/orbCnt,life:65,radius:6,pulse:Math.random()*Math.PI*2});
        totalKills++;
        if(enemy.isBoss){ shakeAmount=Math.max(shakeAmount,18); sfxExplosion(); }
        enemies.splice(idx,1);
    }
    function damagePlayer(amount){
        if(player.invincibleTimer>0) return;
        const dmg=Math.max(1,amount-player.armor);
        player.hp-=dmg; player.invincibleTimer=0.4; shakeAmount=Math.max(shakeAmount,7);
        totalDamageReceived += dmg;
        spawnDamageNumber(player.x,player.y-20,dmg,'#ff4444');
        for(let i=0;i<10;i++){ const a=Math.random()*Math.PI*2; spawnParticle(player.x,player.y,Math.cos(a)*120,Math.sin(a)*120,'#ff6666',0.35,3); }
        if(player.hp<=0){
            player.hp=0; gameState=STATE.GAMEOVER; gameEndTime = Date.now();
            audioManager.stopBGM(); sfxExplosion();
            for(let i=0;i<120;i++){ const a=Math.random()*Math.PI*2; spawnParticle(player.x,player.y,Math.cos(a)*320,Math.sin(a)*320,'#ff8888',0.7,4); }
        }
    }

    function startGame(mode){
        initAudio(); audioManager.playBGM();
        gameMode=mode; resetPlayer(); enemies=[]; projectiles=[]; particles=[]; damageNumbers=[]; lightningArcs=[]; expOrbs=[]; blackHoles=[];
        waveNumber=0; waveTimer=0; totalKills=0; gameTime=0; shakeAmount=0; stageIndex=0; stageTransitionTimer=0;
        totalDamageDealt=0; totalDamageReceived=0; gameStartTime=Date.now(); gameEndTime=0;
        gameState=STATE.WAVE_TRANS; waveTimer=1.8; advanceWave();
        menuButtons.style.display='none'; photoAssignPanel.style.display='none';
        joystickActive=false; joystickTouchId=null;
    }
    function resetGame(){
        audioManager.stopBGM();
        gameState=STATE.MENU; menuButtons.style.display='flex'; photoAssignPanel.style.display='none';
        enemies=[]; projectiles=[]; particles=[]; damageNumbers=[]; lightningArcs=[]; expOrbs=[]; blackHoles=[];
        joystickActive=false; joystickTouchId=null;
        memePlayerImg=null; memeEnemyImgs=[]; pendingMemeImages=[]; selectedPlayerPhotoIndex=-1;
    }
    function advanceWave(){
        waveNumber++; waveTimer=0;
        waveDuration = gameMode === 'hard' ? Math.max(15, 28 - waveNumber * 1.2) : 26 + waveNumber * 2;
        if(waveNumber>1 && waveNumber%6===0 && stageIndex<TOTAL_STAGES-1){ stageIndex++; stageTransitionTimer=2.8; enemies=[]; projectiles=[]; lightningArcs=[]; expOrbs=[]; blackHoles=[]; }
        const isBossWave=(waveNumber%5===0) && stageTransitionTimer<=0;
        if(isBossWave){ const bt=STAGES[Math.min(stageIndex,STAGES.length-1)].boss; spawnBoss(bt); }
        for(let i=0;i<Math.min(10+waveNumber*2,35);i++) spawnEnemyAtEdge();
        gameState=STATE.PLAYING;
    }
    function updateWaveTransition(dt){ if(gameState!==STATE.WAVE_TRANS)return; waveTimer-=dt; if(waveTimer<=0) advanceWave(); }
    function checkWaveProgress(){
        if(gameState!==STATE.PLAYING)return;
        waveTimer+=deltaTime;
        const spawnInterval = gameMode === 'hard' ? Math.max(0.15, 1.5 - waveNumber * 0.12) : Math.max(0.25, 2.2 - waveNumber * 0.08);
        if(waveTimer%spawnInterval<deltaTime && enemies.length<55+waveNumber*9) spawnEnemyAtEdge();
        const allDead=enemies.length===0 && waveTimer>3;
        if(waveTimer>=waveDuration || allDead){
            gameState=STATE.WAVE_TRANS; waveTimer=2.2; sfxWaveClear();
            player.hp=Math.min(player.maxHp, player.hp+Math.floor(player.maxHp*0.12));
        }
        if(stageTransitionTimer>0) stageTransitionTimer-=deltaTime;
        if(stageIndex>=TOTAL_STAGES-1 && waveNumber>=25 && enemies.length===0 && gameState===STATE.WAVE_TRANS) {
            gameState=STATE.VICTORY; gameEndTime = Date.now(); audioManager.stopBGM();
        }
    }

    function update(dt){
        if(gameState===STATE.MENU||gameState===STATE.GAMEOVER||gameState===STATE.VICTORY||gameState===STATE.PAUSED){
            updateParticles(dt); updateDamageNumbers(dt); updateLightningArcs(dt); updateExpOrbs(dt);
            return;
        }
        if(gameState===STATE.LEVELUP){
            updateParticles(dt); updateDamageNumbers(dt); updateLightningArcs(dt); updateExpOrbs(dt);
            return;
        }
        deltaTime=Math.min(dt,0.1); gameTime+=deltaTime;
        if(player.invincibleTimer>0) player.invincibleTimer-=deltaTime;
        if(shakeAmount>0) shakeAmount*=0.85; if(shakeAmount<0.1) shakeAmount=0;

        let mx=joystickDX, my=joystickDY;
        if(keys['w']||keys['arrowup']) my-=1; if(keys['s']||keys['arrowdown']) my+=1;
        if(keys['a']||keys['arrowleft']) mx-=1; if(keys['d']||keys['arrowright']) mx+=1;
        const mag=Math.sqrt(mx*mx+my*my); if(mag>1){ mx/=mag; my/=mag; }
        player.x+=mx*player.speed*deltaTime; player.y+=my*player.speed*deltaTime;
        player.x=Math.max(player.radius,Math.min(W-player.radius,player.x));
        player.y=Math.max(player.radius,Math.min(H-player.radius,player.y));

        if(player.regen>0){ player.regenTimer+=deltaTime; while(player.regenTimer>=1.0){ player.regenTimer-=1.0; player.hp=Math.min(player.maxHp,player.hp+player.regen); } }
        for(const w of player.weapons){ w.timer-=deltaTime; while(w.timer<=0){ w.timer+=w.cooldown; fireWeapon(w); } if(w.type==='spinningShield') w.orbitAngle+=w.orbitSpeed*deltaTime; }
        updateBlackHoles(deltaTime); updateProjectiles(deltaTime); updateEnemies(deltaTime); updateExpOrbs(deltaTime);
        updateParticles(deltaTime); updateDamageNumbers(deltaTime); updateLightningArcs(deltaTime);
        updateWaveTransition(deltaTime); checkWaveProgress();
        if(player.exp>=player.expToNext && gameState===STATE.PLAYING) triggerLevelUp();
        if(player.hp<=0 && gameState===STATE.PLAYING){ gameState=STATE.GAMEOVER; gameEndTime=Date.now(); audioManager.stopBGM(); sfxExplosion(); for(let i=0;i<120;i++){ const a=Math.random()*Math.PI*2; spawnParticle(player.x,player.y,Math.cos(a)*320,Math.sin(a)*320,'#ff8888',0.7,4); } }
    }

    function fireWeapon(w){
        switch(w.type){
            case'magicBolt': fireMagicBolt(w); break;
            case'lightningChain': fireLightningChain(w); break;
            case'fireNova': fireNova(w); break;
            case'iceShard': fireIceShard(w); break;
            case'ricochetBolt': fireRicochetBolt(w); break;
            case'scatterShot': fireScatterShot(w); break;
            case'blackHole': spawnBlackHole(w); break;
        }
    }
    function nearestEnemy(x,y,range=Infinity,exclude=new Set()){ let best=null,bd=range; for(const e of enemies){ if(exclude.has(e))continue; const d=Math.hypot(e.x-x,e.y-y); if(d<bd){ bd=d; best=e; } } return best; }
    function fireMagicBolt(w){ const t=nearestEnemy(player.x,player.y,w.range); for(let i=0;i<w.count;i++){ let a; if(t){ const dx=t.x-player.x,dy=t.y-player.y; a=Math.atan2(dy,dx)+(i-(w.count-1)/2)*0.22; } else a=Math.random()*Math.PI*2; const vx=Math.cos(a)*w.speed, vy=Math.sin(a)*w.speed; spawnProjectile(player.x,player.y,vx,vy,w); } }
    function fireLightningChain(w){ let src=nearestEnemy(player.x,player.y,320); if(!src)return; const hit=new Set([src]); dealDamage(src,w.damage,w); spawnLightningArc(player.x,player.y,src.x,src.y,w.glow,0.3); let cur=src; for(let c=1;c<w.count;c++){ let next=null,nd=w.chainRange; for(const e of enemies){ if(hit.has(e))continue; const d=Math.hypot(e.x-cur.x,e.y-cur.y); if(d<nd){ nd=d; next=e; } } if(!next)break; hit.add(next); dealDamage(next,Math.floor(w.damage*0.8),w); spawnLightningArc(cur.x,cur.y,next.x,next.y,w.glow,0.22); cur=next; } }
    function fireNova(w){ const r=w.novaRadius; for(let i=0;i<40;i++){ const a=(i/40)*Math.PI*2; spawnParticle(player.x,player.y,Math.cos(a)*r*0.55,Math.sin(a)*r*0.55,w.glow,0.4,5); } for(const e of enemies){ if(Math.hypot(e.x-player.x,e.y-player.y)<r) dealDamage(e,w.damage,w); } shakeAmount=Math.max(shakeAmount,4); }
    function fireIceShard(w){ for(let i=0;i<w.count;i++){ const ba=Math.random()*Math.PI*2; const a=ba+(i-(w.count-1)/2)*w.spread; const vx=Math.cos(a)*w.speed, vy=Math.sin(a)*w.speed; spawnProjectile(player.x,player.y,vx,vy,w); } }
    function fireRicochetBolt(w){ const t=nearestEnemy(player.x,player.y,w.range); for(let i=0;i<w.count;i++){ let a; if(t){ const dx=t.x-player.x,dy=t.y-player.y; a=Math.atan2(dy,dx)+(i-(w.count-1)/2)*0.3; } else a=Math.random()*Math.PI*2; const vx=Math.cos(a)*w.speed, vy=Math.sin(a)*w.speed; spawnProjectile(player.x,player.y,vx,vy,w,{ricochetLeft:w.ricochet}); } }
    function fireScatterShot(w){ const baseAngle=Math.random()*Math.PI*2; for(let i=0;i<w.count;i++){ const a=baseAngle+(i-(w.count-1)/2)*w.spread; const vx=Math.cos(a)*w.speed, vy=Math.sin(a)*w.speed; spawnProjectile(player.x,player.y,vx,vy,w); } }
    function spawnBlackHole(w){ blackHoles.push({x:player.x,y:player.y,weapon:w,life:w.duration,maxLife:w.duration,pullRadius:w.pullRadius,damageRadius:w.damageRadius,damageTimer:0,damageInterval:0.4}); }

    function updateBlackHoles(dt){ for(let i=blackHoles.length-1;i>=0;i--){ const bh=blackHoles[i]; bh.life-=dt; if(bh.life<=0){ blackHoles.splice(i,1); continue; } for(const e of enemies){ const dx=bh.x-e.x,dy=bh.y-e.y,dist=Math.hypot(dx,dy); if(dist<bh.pullRadius && dist>5){ const strength=1-dist/bh.pullRadius; e.x+=dx/dist*strength*200*dt; e.y+=dy/dist*strength*200*dt; } } bh.damageTimer+=dt; while(bh.damageTimer>=bh.damageInterval){ bh.damageTimer-=bh.damageInterval; for(const e of enemies){ if(Math.hypot(e.x-bh.x,e.y-bh.y)<bh.damageRadius) dealDamage(e,bh.weapon.damage,bh.weapon); } } if(Math.random()<0.6) spawnParticle(bh.x+(Math.random()-0.5)*40,bh.y+(Math.random()-0.5)*40,0,0,bh.weapon.glow,0.3,4); } }
    function updateProjectiles(dt){ for(let i=projectiles.length-1;i>=0;i--){ const p=projectiles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; if(p.x<-60||p.x>W+60||p.y<-60||p.y>H+60||p.life<=0){ spawnParticle(p.x,p.y,0,0,p.weapon.glow,0.25,4); projectiles.splice(i,1); continue; } let hit=false; for(const e of enemies){ if(p.hitEnemies.has(e))continue; if(Math.hypot(p.x-e.x,p.y-e.y)<e.radius+p.weapon.size+5){ dealDamage(e,p.damage,p.weapon); p.hitEnemies.add(e); if(p.ricochetLeft>0){ p.ricochetLeft--; const next=nearestEnemy(p.x,p.y,300,new Set(p.hitEnemies)); if(next){ const angle=Math.atan2(next.y-p.y,next.x-p.x); p.vx=Math.cos(angle)*p.weapon.speed*0.9; p.vy=Math.sin(angle)*p.weapon.speed*0.9; p.life=Math.min(p.life,1.5); }else{ hit=true; break; } }else if(p.pierceRemaining<=0){ hit=true; break; } else p.pierceRemaining--; } } if(hit){ spawnParticle(p.x,p.y,0,0,p.weapon.glow,0.3,5); projectiles.splice(i,1); } } }
    function updateEnemies(dt){ for(const e of enemies){ if(e.slowTimer>0){ e.slowTimer-=dt; if(e.slowTimer<=0)e.slowAmount=0; } const spMult=e.slowTimer>0?(1-e.slowAmount):1; const dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy); if(dist>1){ e.x+=dx/dist*e.speed*spMult*dt; e.y+=dy/dist*e.speed*spMult*dt; } if(dist<player.radius+e.radius) damagePlayer(e.damage); if(e.hitFlashTimer>0)e.hitFlashTimer-=dt; if(e.isBoss){ e.phaseTimer+=dt; e.specialTimer-=dt; if(e.specialTimer<=0&&dist<320){ e.specialTimer=4+Math.random()*3; if(e.bossType==='necromancer'&&enemies.length<55){ for(let j=0;j<3;j++) spawnEnemy('skeleton',e.x+(Math.random()-0.5)*110,e.y+(Math.random()-0.5)*110); } } } if(e._shieldHitCd>0)e._shieldHitCd-=dt; } for(const w of player.weapons){ if(w.type!=='spinningShield')continue; for(let i=0;i<w.count;i++){ const ang=w.orbitAngle+(i/w.count)*Math.PI*2; const sx=player.x+Math.cos(ang)*w.orbitRadius, sy=player.y+Math.sin(ang)*w.orbitRadius; if(Math.random()<0.35) spawnParticle(sx,sy,0,0,w.glow,0.2,2.5); for(const e of enemies){ if(Math.hypot(sx-e.x,sy-e.y)<e.radius+w.size+4){ if(!e._shieldHitCd||e._shieldHitCd<=0){ e._shieldHitCd=0.38; dealDamage(e,w.damage,w); } } } } } }
    function updateExpOrbs(dt){ for(let i=expOrbs.length-1;i>=0;i--){ const o=expOrbs[i]; o.life-=dt; o.pulse+=dt*5; if(o.life<=0){ expOrbs.splice(i,1); continue; } const dx=player.x-o.x,dy=player.y-o.y,dist=Math.hypot(dx,dy); if(dist<player.expPickupRange){ const sp=280+(1-dist/player.expPickupRange)*500; const mv=Math.min(sp*dt,dist); if(dist>0.5){ o.x+=dx/dist*mv; o.y+=dy/dist*mv; } if(dist<22){ player.exp+=o.value; expOrbs.splice(i,1); sfxPickup(); spawnParticle(o.x,o.y,0,0,'#ffe8a0',0.35,4); } } } }
    function updateParticles(dt){ for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; if(p.life<=0)particles.splice(i,1); } }
    function updateDamageNumbers(dt){ for(let i=damageNumbers.length-1;i>=0;i--){ const d=damageNumbers[i]; d.y+=d.vy*dt; d.life-=dt; if(d.life<=0)damageNumbers.splice(i,1); } }
    function updateLightningArcs(dt){ for(let i=lightningArcs.length-1;i>=0;i--){ if((lightningArcs[i].life-=dt)<=0)lightningArcs.splice(i,1); } }

    // ==================== 浮动摇杆处理 ====================
    function canvasCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left) / (rect.width / W),
            y: (clientY - rect.top) / (rect.height / H),
        };
    }

    function resetJoystick() {
        joystickActive = false;
        joystickTouchId = null;
        joystickDX = 0;
        joystickDY = 0;
        joystickBaseX = 0;
        joystickBaseY = 0;
        joystickThumbX = 0;
        joystickThumbY = 0;
    }

    function updateJoystickFromTouch(cx, cy) {
        const dx = cx - joystickBaseX;
        const dy = cy - joystickBaseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const clamped = Math.min(dist, joystickMaxRadius);
        if (clamped > 3) {
            joystickDX = (dx / dist) * (clamped / joystickMaxRadius);
            joystickDY = (dy / dist) * (clamped / joystickMaxRadius);
            joystickThumbX = joystickBaseX + (dx / dist) * clamped;
            joystickThumbY = joystickBaseY + (dy / dist) * clamped;
        } else {
            joystickDX = 0;
            joystickDY = 0;
            joystickThumbX = joystickBaseX;
            joystickThumbY = joystickBaseY;
        }
    }

    // 暂停按钮区域（扩大并修正位置）
    const pauseRect = { x: 10, y: 55, w: 48, h: 48 };

    function isInPauseButton(cx, cy) {
        return cx >= pauseRect.x && cx <= pauseRect.x + pauseRect.w &&
               cy >= pauseRect.y && cy <= pauseRect.y + pauseRect.h;
    }

    // 判断是否为游戏操作区域（非UI）
    function isGameplayArea(cx, cy) {
        // 暂停按钮区域不算
        if (isInPauseButton(cx, cy)) return false;
        // 顶部状态栏区域不算
        if (cy < 55) return false;
        return true;
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        if (gameState === STATE.MENU) return;

        for (const touch of e.changedTouches) {
            const coords = canvasCoords(touch.clientX, touch.clientY);

            // 升级界面：记录点击
            if (gameState === STATE.LEVELUP) {
                window._levelTap = coords;
                return;
            }

            // 游戏结束/胜利
            if (gameState === STATE.GAMEOVER || gameState === STATE.VICTORY) {
                resetGame();
                return;
            }

            // 暂停按钮
            if ((gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS || gameState === STATE.PAUSED) &&
                isInPauseButton(coords.x, coords.y)) {
                if (gameState === STATE.PAUSED) {
                    gameState = prevPauseState || STATE.PLAYING;
                    audioManager.resumeBGM();
                } else {
                    prevPauseState = gameState;
                    gameState = STATE.PAUSED;
                    audioManager.pauseBGM();
                }
                return;
            }

            // 游戏中：激活浮动摇杆
            if ((gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS) && isGameplayArea(coords.x, coords.y) && !joystickActive) {
                joystickActive = true;
                joystickTouchId = touch.identifier;
                joystickBaseX = coords.x;
                joystickBaseY = coords.y;
                joystickThumbX = coords.x;
                joystickThumbY = coords.y;
                joystickDX = 0;
                joystickDY = 0;
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (joystickActive && joystickTouchId !== null) {
            for (const touch of e.touches) {
                if (touch.identifier === joystickTouchId) {
                    const coords = canvasCoords(touch.clientX, touch.clientY);
                    updateJoystickFromTouch(coords.x, coords.y);
                    break;
                }
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (const touch of e.changedTouches) {
            if (touch.identifier === joystickTouchId) {
                // 检查是否是升级界面点击
                if (gameState === STATE.LEVELUP && window._levelTap) {
                    const coords = canvasCoords(touch.clientX, touch.clientY);
                    const dx = coords.x - window._levelTap.x;
                    const dy = coords.y - window._levelTap.y;
                    if (Math.sqrt(dx*dx+dy*dy) < 15) {
                        handleLevelUpClick(window._levelTap.x, window._levelTap.y);
                    }
                    delete window._levelTap;
                }
                resetJoystick();
                break;
            }
        }
        if (e.touches.length === 0) resetJoystick();
    }, { passive: false });

    canvas.addEventListener('touchcancel', () => { resetJoystick(); });

    // 鼠标事件（桌面调试）
    canvas.addEventListener('mousedown', (e) => {
        initAudio();
        const coords = canvasCoords(e.clientX, e.clientY);
        if (gameState === STATE.MENU) return;
        if (gameState === STATE.LEVELUP) { window._levelTap = coords; return; }
        if (gameState === STATE.GAMEOVER || gameState === STATE.VICTORY) { resetGame(); return; }
        if ((gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS || gameState === STATE.PAUSED) && isInPauseButton(coords.x, coords.y)) {
            if (gameState === STATE.PAUSED) { gameState = prevPauseState || STATE.PLAYING; audioManager.resumeBGM(); }
            else { prevPauseState = gameState; gameState = STATE.PAUSED; audioManager.pauseBGM(); }
            return;
        }
        if ((gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS) && isGameplayArea(coords.x, coords.y)) {
            joystickActive = true;
            joystickBaseX = coords.x;
            joystickBaseY = coords.y;
            joystickThumbX = coords.x;
            joystickThumbY = coords.y;
            joystickDX = 0; joystickDY = 0;
        }
    });
    canvas.addEventListener('mousemove', (e) => {
        if (joystickActive) {
            const coords = canvasCoords(e.clientX, e.clientY);
            updateJoystickFromTouch(coords.x, coords.y);
        }
    });
    canvas.addEventListener('mouseup', (e) => {
        if (gameState === STATE.LEVELUP && window._levelTap) {
            const coords = canvasCoords(e.clientX, e.clientY);
            if (Math.hypot(coords.x - window._levelTap.x, coords.y - window._levelTap.y) < 10) {
                handleLevelUpClick(window._levelTap.x, window._levelTap.y);
            }
            delete window._levelTap;
        }
        resetJoystick();
    });
    canvas.addEventListener('mouseleave', () => { resetJoystick(); });

    let prevPauseState = STATE.PLAYING;
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        initAudio();
        if (e.key === 'Escape' || e.key === 'p') {
            if (gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS) { prevPauseState = gameState; gameState = STATE.PAUSED; audioManager.pauseBGM(); }
            else if (gameState === STATE.PAUSED) { gameState = prevPauseState || STATE.PLAYING; audioManager.resumeBGM(); }
            return;
        }
        if (gameState === STATE.MENU && (e.key===' '||e.key==='Enter')) startGame('normal');
        if (gameState === STATE.LEVELUP) handleLevelUpKey(e.key);
        if ((gameState===STATE.GAMEOVER||gameState===STATE.VICTORY) && (e.key===' '||e.key==='Enter'||e.key==='r')) resetGame();
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    btnNormal.addEventListener('click',()=>{ initAudio(); startGame('normal'); });
    btnMeme.addEventListener('click',()=>{ initAudio(); photoInput.value=''; photoInput.click(); });
    btnHard.addEventListener('click',()=>{ initAudio(); startGame('hard'); });
    photoInput.addEventListener('change',e=>{ const files=Array.from(e.target.files); if(files.length===0)return; processMemeImages(files); });
    btnConfirmAssign.addEventListener('click',confirmPhotoAssignment);
    btnCancelAssign.addEventListener('click',cancelPhotoAssignment);

    async function processMemeImages(files){
        const loadImg=f=>new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=ev=>{ const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=ev.target.result; }; r.readAsDataURL(f); });
        const imgs=[]; for(const f of files){ try{ imgs.push(await loadImg(f)); }catch(e){} } if(imgs.length===0)return;
        const cropped=[]; for(const img of imgs) cropped.push(await cropCircle(img,130));
        pendingMemeImages=cropped; selectedPlayerPhotoIndex=-1; showPhotoAssignPanel();
    }
    function cropCircle(img,size){ return new Promise(resolve=>{ const c=document.createElement('canvas'); c.width=size; c.height=size; const cx=c.getContext('2d'); cx.beginPath(); cx.arc(size/2,size/2,size/2,0,Math.PI*2); cx.clip(); const min=Math.min(img.width,img.height); cx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,size,size); const r=new Image(); r.onload=()=>resolve(r); r.src=c.toDataURL(); if(r.complete) resolve(r); }); }
    function showPhotoAssignPanel(){ photoGrid.innerHTML=''; pendingMemeImages.forEach((img,i)=>{ const s=document.createElement('img'); s.src=img.src; s.className='photo-slot'; s.addEventListener('click',()=>selectPlayerPhoto(i)); photoGrid.appendChild(s); }); selectedPlayerPhotoIndex=-1; assignHint.textContent='👆 请点击选择你的角色照片'; updatePhotoSlotStyles(); menuButtons.style.display='none'; photoAssignPanel.style.display='flex'; }
    function selectPlayerPhoto(i){ selectedPlayerPhotoIndex=i; assignHint.textContent='✅ 已选择！'; updatePhotoSlotStyles(); }
    function updatePhotoSlotStyles(){ const ss=photoGrid.querySelectorAll('.photo-slot'); ss.forEach((s,i)=>{ s.classList.remove('selected-player','selected-enemy'); if(i===selectedPlayerPhotoIndex) s.classList.add('selected-player'); else if(selectedPlayerPhotoIndex>=0) s.classList.add('selected-enemy'); }); }
    function confirmPhotoAssignment(){ if(selectedPlayerPhotoIndex<0&&pendingMemeImages.length>0) selectedPlayerPhotoIndex=0; if(pendingMemeImages.length===0)return; memePlayerImg=pendingMemeImages[selectedPlayerPhotoIndex]; memeEnemyImgs=[]; for(let i=0;i<pendingMemeImages.length;i++){ if(i!==selectedPlayerPhotoIndex) memeEnemyImgs.push(pendingMemeImages[i]); } if(memeEnemyImgs.length===0) memeEnemyImgs.push(pendingMemeImages[0]); photoAssignPanel.style.display='none'; menuButtons.style.display='none'; pendingMemeImages=[]; startGame('meme'); }
    function cancelPhotoAssignment(){ photoAssignPanel.style.display='none'; menuButtons.style.display='flex'; pendingMemeImages=[]; selectedPlayerPhotoIndex=-1; memePlayerImg=null; memeEnemyImgs=[]; }

    function render(){
        ctx.clearRect(0,0,W,H);
        let sx=0,sy=0; if(shakeAmount>0.3){ sx=(Math.random()-0.5)*shakeAmount; sy=(Math.random()-0.5)*shakeAmount; }
        ctx.save(); ctx.translate(sx,sy);
        const stg=STAGES[Math.min(stageIndex,STAGES.length-1)];
        const bg=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,600); bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(0.5,stg.bg1); bg.addColorStop(1,stg.bg2);
        ctx.fillStyle=bg; ctx.fillRect(-20,-20,W+40,H+40);
        for(const o of expOrbs){ const r=o.radius+Math.sin(o.pulse)*2; ctx.globalAlpha=Math.min(1,o.life/5); ctx.fillStyle='rgba(180,255,140,0.7)'; ctx.beginPath(); ctx.arc(o.x,o.y,r*2.5,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#e0ffcc'; ctx.beginPath(); ctx.arc(o.x,o.y,r,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
        for(const bh of blackHoles){ ctx.fillStyle='rgba(80,0,160,0.25)'; ctx.beginPath(); ctx.arc(bh.x,bh.y,bh.pullRadius,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=bh.weapon.glow; ctx.lineWidth=2; ctx.stroke(); }
        for(const p of projectiles){ const a=Math.min(1,p.life/p.maxLife); ctx.globalAlpha=a*0.7; ctx.fillStyle=p.weapon.glow; ctx.beginPath(); ctx.arc(p.x,p.y,p.weapon.size*3.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=a; ctx.fillStyle=p.weapon.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.weapon.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
        for(const w of player.weapons){ if(w.type!=='spinningShield')continue; for(let i=0;i<w.count;i++){ const a=w.orbitAngle+(i/w.count)*Math.PI*2; const sx=player.x+Math.cos(a)*w.orbitRadius, sy=player.y+Math.sin(a)*w.orbitRadius; ctx.fillStyle=w.glow; ctx.beginPath(); ctx.arc(sx,sy,w.size*3.2,0,Math.PI*2); ctx.fill(); ctx.fillStyle=w.color; ctx.beginPath(); ctx.arc(sx,sy,w.size,0,Math.PI*2); ctx.fill(); } }
        for(const arc of lightningArcs){ if(arc.segments.length<2)continue; const a=arc.life/arc.maxLife; ctx.strokeStyle=arc.color; ctx.lineWidth=3*a; ctx.shadowColor=arc.color; ctx.shadowBlur=14*a; ctx.beginPath(); ctx.moveTo(arc.segments[0].x,arc.segments[0].y); for(let j=1;j<arc.segments.length;j++) ctx.lineTo(arc.segments[j].x,arc.segments[j].y); ctx.stroke(); ctx.shadowBlur=0; }
        for(const e of enemies){
            if(gameMode==='meme' && e.assignedImg){ ctx.save(); ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2); ctx.clip(); ctx.drawImage(e.assignedImg,e.x-e.radius,e.y-e.radius,e.radius*2,e.radius*2); ctx.restore(); ctx.strokeStyle=e.glowColor; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(e.x,e.y,e.radius+3,0,Math.PI*2); ctx.stroke(); }
            else{ const fc=e.hitFlashTimer>0?'#fff':e.color; ctx.fillStyle=e.glowColor; ctx.beginPath(); ctx.arc(e.x,e.y,e.radius*2.2,0,Math.PI*2); ctx.fill(); ctx.fillStyle=fc; ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2); ctx.fill(); }
            if(e.isBoss){ const barW=e.radius*2.6; ctx.fillStyle='#400'; ctx.fillRect(e.x-barW/2,e.y-e.radius-20,barW,8); ctx.fillStyle='#f33'; ctx.fillRect(e.x-barW/2,e.y-e.radius-20,barW*(e.hp/e.maxHp),8); ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText(e.bossName,e.x,e.y-e.radius-28); }
        }
        ctx.save();
        if(gameMode==='meme' && memePlayerImg){ ctx.beginPath(); ctx.arc(player.x,player.y,player.radius,0,Math.PI*2); ctx.clip(); ctx.drawImage(memePlayerImg,player.x-player.radius,player.y-player.radius,player.radius*2,player.radius*2); }
        else{ const pg=ctx.createRadialGradient(player.x-5,player.y-5,3,player.x,player.y,player.radius); pg.addColorStop(0,'#fff'); pg.addColorStop(0.4,player.color); pg.addColorStop(1,player.glowColor); ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(player.x,player.y,player.radius,0,Math.PI*2); ctx.fill(); }
        ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(player.x,player.y,player.radius+2,0,Math.PI*2); ctx.stroke();
        ctx.restore();
        for(const p of particles){ const a=p.life/p.maxLife; ctx.globalAlpha=a; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
        for(const d of damageNumbers){ ctx.globalAlpha=d.life/d.maxLife; ctx.fillStyle=d.color; ctx.font='bold 15px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.value,d.x,d.y); } ctx.globalAlpha=1;
        ctx.restore();

        // 绘制浮动摇杆（在游戏区域）
        if (joystickActive && (gameState === STATE.PLAYING || gameState === STATE.WAVE_TRANS)) {
            ctx.save();
            // 基座
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(joystickBaseX, joystickBaseY, joystickMaxRadius, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            // 拇指
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(joystickThumbX, joystickThumbY, 22, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.restore();
        }

        renderUI();
    }

    function renderUI(){
        // 顶部状态栏
        ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,52);
        ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='left';
        ctx.fillText(`❤️ ${Math.ceil(player.hp)}/${player.maxHp}`,12,20);
        ctx.fillText(`⭐ Lv${player.level}`,12,38);
        ctx.textAlign='right';
        ctx.fillText(`${STAGES[Math.min(stageIndex,STAGES.length-1)].name} | 波${waveNumber}`,W-12,20);
        ctx.fillText(`击杀: ${totalKills}`,W-12,38);
        for(let i=0;i<player.weapons.length;i++){ const w=player.weapons[i]; ctx.fillStyle=w.glow; ctx.font='9px sans-serif'; ctx.fillText(`${w.name} Lv${w.level}`,W-12,H-15-i*16); }

        // 暂停按钮
        if(gameState===STATE.PLAYING||gameState===STATE.WAVE_TRANS||gameState===STATE.PAUSED){
            ctx.fillStyle='rgba(255,255,255,0.2)';
            ctx.strokeStyle='rgba(255,255,255,0.7)';
            ctx.lineWidth=2.5;
            ctx.beginPath();
            ctx.roundRect(pauseRect.x, pauseRect.y, pauseRect.w, pauseRect.h, 10);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle='#fff';
            ctx.font='bold 22px sans-serif';
            ctx.textAlign='center';
            ctx.fillText(gameState===STATE.PAUSED?'▶':'⏸', pauseRect.x + pauseRect.w/2, pauseRect.y + pauseRect.h/2 + 7);
        }

        if(gameState===STATE.WAVE_TRANS){
            ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
            ctx.fillText(`⚔ 第 ${waveNumber+1} 波即将开始`,W/2,H/2-30);
        }
        if(gameState===STATE.PAUSED){
            ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#fff'; ctx.font='bold 36px sans-serif'; ctx.textAlign='center';
            ctx.fillText('⏸ 已暂停',W/2,H/2-20);
        }
        if(gameState===STATE.LEVELUP){
            ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#ffd700'; ctx.font='bold 24px sans-serif'; ctx.textAlign='center'; ctx.fillText('选择升级',W/2,80);
            const cols=2, cardW=180, cardH=110, gapX=15, gapY=12;
            const rows=Math.ceil(currentUpgradeOptions.length/cols);
            const tw=cols*cardW+(cols-1)*gapX, th=rows*cardH+(rows-1)*gapY;
            const sx=(W-tw)/2, sy=130+(H-130-th)/2;
            upgradeCardRects=[];
            for(let i=0;i<currentUpgradeOptions.length;i++){
                const col=i%cols, row=Math.floor(i/cols);
                const cx=sx+col*(cardW+gapX), cy=sy+row*(cardH+gapY);
                upgradeCardRects.push({x:cx,y:cy,w:cardW,h:cardH});
                const o=currentUpgradeOptions[i];
                ctx.fillStyle='#2a2a3e'; ctx.strokeStyle=o.rarity==='legendary'?'#ffd700':o.rarity==='rare'?'#ff8844':'#b27aff'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.roundRect(cx,cy,cardW,cardH,10); ctx.fill(); ctx.stroke();
                ctx.fillStyle='#fff'; ctx.font='24px sans-serif'; ctx.textAlign='center'; ctx.fillText(o.icon,cx+cardW/2,cy+30);
                ctx.fillStyle='#ffe8c0'; ctx.font='bold 12px sans-serif'; ctx.fillText(o.name,cx+cardW/2,cy+50);
                ctx.fillStyle='#ccc'; ctx.font='10px sans-serif'; ctx.fillText(o.desc,cx+cardW/2,cy+68);
                ctx.fillStyle='#aaa'; ctx.font='bold 16px sans-serif'; ctx.fillText(`${i+1}`,cx+cardW-18,cy+20);
            }
        }
        if(gameState===STATE.GAMEOVER || gameState===STATE.VICTORY){
            renderResultPanel();
        }
        if(gameState===STATE.MENU){
            // 酷炫开始界面由CSS+Canvas混合渲染
            ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
            // 标题
            const titleGrad = ctx.createLinearGradient(W/2-150, H*0.2, W/2+150, H*0.2);
            titleGrad.addColorStop(0, '#ffd700');
            titleGrad.addColorStop(0.5, '#ffaa40');
            titleGrad.addColorStop(1, '#ffd700');
            ctx.fillStyle = titleGrad;
            ctx.font = 'bold 48px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🌙 暗夜幸存者', W/2, H*0.25);
            // 副标题
            ctx.fillStyle = '#d4aaff';
            ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.fillText('SHADOW SURVIVOR', W/2, H*0.25 + 40);
            // 底部提示
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('选择模式开始游戏', W/2, H*0.82);
            ctx.fillText('音频文件：bgm.mp3 / hit*.mp3 / pickup.mp3', W/2, H*0.86);
        }
    }

    function renderResultPanel(){
        const endTime = gameEndTime || Date.now();
        const elapsed = Math.floor((endTime - gameStartTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        const timeStr = `${minutes}分${seconds}秒`;
        const isVictory = gameState === STATE.VICTORY;

        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0,0,W,H);
        const panelW = 380, panelH = 420;
        const px = (W - panelW) / 2, py = (H - panelH) / 2 - 30;
        ctx.fillStyle = 'rgba(20,15,35,0.95)';
        ctx.strokeStyle = isVictory ? '#ffd700' : '#ff5555';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(px, py, panelW, panelH, 20); ctx.fill(); ctx.stroke();
        ctx.fillStyle = isVictory ? '#ffd700' : '#ff8888';
        ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(isVictory ? '🏆 胜利！' : '💀 失败', W/2, py + 50);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px sans-serif';
        const leftX = px + 40, rightX = px + panelW/2 + 20;
        let y = py + 90;
        const lineH = 32;
        const drawRow = (label, value, color='#ffffff') => {
            ctx.fillStyle = '#aaa'; ctx.textAlign = 'left';
            ctx.fillText(label, leftX, y);
            ctx.fillStyle = color; ctx.textAlign = 'right';
            ctx.fillText(String(value), rightX + 100, y);
            y += lineH;
        };
        drawRow('存活时间', timeStr, '#ffaa00');
        drawRow('消灭敌人', totalKills);
        drawRow('达到波次', waveNumber);
        drawRow('角色等级', player.level);
        drawRow('造成总伤害', totalDamageDealt, '#ff6666');
        drawRow('承受总伤害', totalDamageReceived, '#ff8888');
        drawRow('最高武器数', player.weapons.length);
        drawRow('暴击率', `${Math.floor(player.critChance*100)}%`);
        ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('点击屏幕重新开始', W/2, py + panelH - 30);
    }

    if(!ctx.roundRect){ ctx.roundRect=function(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }; }

    function gameLoop(ts){
        if(!lastTime) lastTime=ts;
        let dt=(ts-lastTime)/1000; if(dt<=0)dt=0.016; if(dt>0.2)dt=0.2;
        lastTime=ts;
        update(dt); render();
        requestAnimationFrame(gameLoop);
    }
    document.addEventListener('touchmove',e=>{ if(e.target.closest('#game-container')) e.preventDefault(); },{passive:false});
    resetPlayer(); gameState=STATE.MENU; menuButtons.style.display='flex'; photoAssignPanel.style.display='none';
    requestAnimationFrame(gameLoop);
    console.log('✅ 极致优化版已启动！浮动摇杆、精准暂停、酷炫菜单、音频节流');
})();
</script>
